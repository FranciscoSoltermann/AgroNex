services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agronex-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    networks:
      - agronex-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agronex-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    networks:
      - agronex-net
    depends_on:
      - backend

networks:
  agronex-net:
    driver: bridge